"title": "Object"
"short_description": "A single resource or a group of tightly related resources."
"content": 'A single resource or a group of tightly related resources; for example, a work (document) in a written <GlossaryLink display="corpus" id="corpus" />, or the files associated with a dialogue or session in a speech study (recordings, <GlossaryLink display="transcriptions" id="transcription" />, etc.).'