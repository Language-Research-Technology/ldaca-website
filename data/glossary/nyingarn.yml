"title": "Nyingarn"
"short_description": "A three-year Australian Research Council funded project that will provide digital access to early sources of Australia's Indigenous languages."
"content": 'A three-year <GlossaryLink display="Australian Research Council" id="arc" /> funded project that will provide digital access to early sources of Australia’s Indigenous languages, using various ways to turn images of manuscripts into text, including Optical Character Recognition (<GlossaryLink display="OCR" id="ocr" />), and crowdsourced <GlossaryLink display="transcription" id="transcription" /> (using DigiVol).'
