"title": "Licensing"
"short_description": "A process that allows the copyright owner of a work to share the right to access and use some material from the work without reassigning the ownership of the copyright."
"content": 'A process that allows the <GlossaryLink display="copyright owner" id="copyright-owner" /> of a work to share the right to access and use some material from the work without reassigning the ownership of the <GlossaryLink display="copyright" id="copyright" />. License terms establish the conditions for that access and use.'
