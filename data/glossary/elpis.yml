Name: "elpis"
"title": "Elpis"
"short_description": "A tool to obtain a first-pass transcription of untranscribed audio."
"content": 'A <GlossaryLink display="tool" id="tools" /> to obtain a first-pass <GlossaryLink display="transcription" id="transcription" /> of untranscribed audio. It brings cutting-edge speech recognition technology within reach of language workers and researchers who do not have backgrounds in speech engineering.'
