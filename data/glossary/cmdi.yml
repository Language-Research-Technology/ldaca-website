"content": 'Component Metadata Infrastructure. Provides a <GlossaryLink display="standard" id="standard" /> for <GlossaryLink display="metadata" id="metadata" /> within <GlossaryLink display="CLARIN" id="clarin" />. It draws on the earlier ISLE Metadata Initiative (IMDI), but CMDI adopts a more flexible approach, where components are assembled into reusable <GlossaryLink display="profiles" id="profile" />.'
