Name: "phonemic-transcription"
"title": "Phonemic Transcription"
"short_description": "A transcription method that represents speech in terms of the sound contrasts made in a language, using a phonetic alphabet."
"content": 'A <GlossaryLink display="transcription" id="transcription" /> method that represents speech in terms of the sound contrasts made in a language, using a phonetic alphabet, such as the International Phonetic Alphabet (<GlossaryLink display="IPA" id="ipa" />) or <GlossaryLink display="X-SAMPA" id="x-sampa" />.'