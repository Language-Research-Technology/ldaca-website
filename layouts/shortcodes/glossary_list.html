<table>
    {{ range .Site.Data.glossary }}
    <tr>
        {{ if .external_link }}
      <td><a name="{{ .Name }}"></a><b>{{ .title }}</b></td></td>
      <td>{{ .content | markdownify }}<br><a href="{{ .external_link }}" target="_blank">More information</a></td>
    </tr>
    {{ else }}
    <td><a name="{{ .Name }}"></a><b>{{ .title }}</b></td></td>
    <td>{{ .content | markdownify }}</td>
    {{ end }}
    {{ end }}
  </table>
